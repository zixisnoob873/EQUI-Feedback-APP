name: equilibrium_gaming_zone
description: Premium feedback collection terminal for Equilibrium Gaming Zone.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  supabase_flutter: ^2.5.6
  flutter_animate: ^4.5.0
  excel: ^4.0.0
  share_plus: ^9.0.0
  path_provider: ^2.1.3
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  remove_alpha_ios: false
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
